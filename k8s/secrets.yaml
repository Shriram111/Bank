apiVersion: v1
kind: Secret
metadata:
  name: neobank-secrets
  namespace: neobank
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:${DB_PASSWORD}@postgres-service:5432/neobank_cloud"
  REDIS_URL: "redis://redis-service:6379"
  JWT_SECRET: "${JWT_SECRET}"
  JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
  JWT_EXPIRATION: "15m"
  JWT_REFRESH_EXPIRATION: "7d"
